<div class="fintech-wrapper">
  <section class="hero">
    <h1>Knowledge Intelligence Platform</h1>
    <p>Structured assessments designed for measurable growth</p>
  </section>

  @if (quiz$ | async; as quiz) {
    <ng-container>
      @if (quiz.isLoading) {
        <spinner />
      }
      @if (quiz.error) {
        <div class="error">Something went wrong. Please try again.</div>
      }
      <div class="grid">
        @for (data of quiz.data; track data) {
          <quiz-card [quiz]="data"></quiz-card>
        }
      </div>
    </ng-container>
  }
</div>
