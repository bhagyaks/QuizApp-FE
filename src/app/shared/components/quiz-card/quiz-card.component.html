<mat-card class="quiz-card">
  <div class="card-header">
    <span class="category">{{ quiz.category }}</span>
  </div>

  <h2>{{ quiz.title }}</h2>

  <p class="description">
    Advanced question sets to evaluate and strengthen your expertise in
    {{ quiz.title }}.
  </p>

  <div class="card-footer">
    <button mat-flat-button color="primary" (click)="startQuiz()">Start</button>
  </div>
</mat-card>
